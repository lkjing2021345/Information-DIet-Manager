<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 320px;
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 16px;
      margin: 0;
      color: #333;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
    }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .toggle-row span {
      font-size: 13px;
    }
    button {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      color: #fff;
      background: #4285f4;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #3367d6; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #0a0;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Information Diet Manager</h2>

  <label for="apiBase">后端 API 地址</label>
  <input type="text" id="apiBase" placeholder="http://127.0.0.1:8000" />

  <div class="toggle-row">
    <span>启用数据采集</span>
    <input type="checkbox" id="enabled" />
  </div>

  <button id="save">保存设置</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
